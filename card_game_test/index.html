<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡牌抽取測試 - Card Draw Test</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="mobile-wrapper">
        <div class="scene">
            <div class="ambient-vfx"></div>
            <div class="deck-container" id="deck">
                <!-- 牌堆中的裝飾牌（大幅增加厚度，共 30 層） -->
                <div class="card deck-base" style="transform: translateZ(1px);"></div>
                <div class="card deck-base" style="transform: translateZ(2px);"></div>
                <div class="card deck-base" style="transform: translateZ(3px);"></div>
                <div class="card deck-base" style="transform: translateZ(4px);"></div>
                <div class="card deck-base" style="transform: translateZ(5px);"></div>
                <div class="card deck-base" style="transform: translateZ(6px);"></div>
                <div class="card deck-base" style="transform: translateZ(7px);"></div>
                <div class="card deck-base" style="transform: translateZ(8px);"></div>
                <div class="card deck-base" style="transform: translateZ(9px);"></div>
                <div class="card deck-base" style="transform: translateZ(10px);"></div>
                <div class="card deck-base" style="transform: translateZ(11px);"></div>
                <div class="card deck-base" style="transform: translateZ(12px);"></div>
                <div class="card deck-base" style="transform: translateZ(13px);"></div>
                <div class="card deck-base" style="transform: translateZ(14px);"></div>
                <div class="card deck-base" style="transform: translateZ(15px);"></div>
                <div class="card deck-base" style="transform: translateZ(16px);"></div>
                <div class="card deck-base" style="transform: translateZ(17px);"></div>
                <div class="card deck-base" style="transform: translateZ(18px);"></div>
                <div class="card deck-base" style="transform: translateZ(19px);"></div>
                <div class="card deck-base" style="transform: translateZ(20px);"></div>
                <div class="card deck-base" style="transform: translateZ(21px);"></div>
                <div class="card deck-base" style="transform: translateZ(22px);"></div>
                <div class="card deck-base" style="transform: translateZ(23px);"></div>
                <div class="card deck-base" style="transform: translateZ(24px);"></div>
                <div class="card deck-base" style="transform: translateZ(25px);"></div>
                <div class="card deck-base" style="transform: translateZ(26px);"></div>
                <div class="card deck-base" style="transform: translateZ(27px);"></div>
                <div class="card deck-base" style="transform: translateZ(28px);"></div>
                <div class="card deck-base" style="transform: translateZ(29px);"></div>
                <!-- 可點擊的牌堆頂部 -->
                <div class="card main-deck" style="transform: translateZ(30px);">
                    <div class="card-back"></div>
                    <div class="card-glow"></div>
                </div>
                <div class="deck-hint">點擊牌堆抽取卡牌</div>
            </div>

            <div class="hand-container" id="hand">
                <!-- 抽出的牌將在此動態生成 -->
            </div>

            <div id="focusOverlay" class="focus-overlay"></div>
        </div>

        <div class="controls">
            <button id="resetBtn">重置測試</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
