<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡牌單抽測試 - Single Card Draw Test</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="mobile-wrapper">
        <div class="scene">
            <div class="ambient-vfx"></div>
            <div class="deck-container" id="deck">
                <!-- 牌堆裝飾層（簡化節點，從 30 層降為 5 層，其餘厚度由陰影模擬） -->
                <div class="card deck-base" style="transform: translateZ(5px);"></div>
                <div class="card deck-base" style="transform: translateZ(10px);"></div>
                <div class="card deck-base" style="transform: translateZ(15px);"></div>
                <div class="card deck-base" style="transform: translateZ(20px);"></div>
                <div class="card deck-base" style="transform: translateZ(25px);"></div>
                <!-- 可點擊的牌堆頂部 -->
                <div class="card main-deck" style="transform: translateZ(30px);">
                    <div class="card-back"></div>
                    <div class="card-glow"></div>
                </div>
                <div class="deck-hint">點擊牌堆抽取單張卡牌</div>
            </div>

            <div class="hand-container" id="hand">
                <!-- 抽出的牌將在此動態生成 -->
            </div>

            <div id="focusOverlay" class="focus-overlay"></div>

            <!-- 卡牌說明文字面板 -->
            <div id="cardInfoPanel" class="card-info-panel">
                <h3 id="cardInfoTitle">字</h3>
                <p id="cardInfoDesc">說明文字...</p>
            </div>
        </div>

        <div class="controls">
            <button id="resetBtn">重置測試</button>
            <a href="index.html"
                style="margin-left: 10px; color: white; text-decoration: none; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 50px;">回三抽頁面</a>
        </div>
    </div>

    <script src="single_draw.js"></script>
</body>

</html>
