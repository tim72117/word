<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketch Tool - Outline Master</title>
    <link rel="stylesheet" href="style.css?v=11">
    <style>
        @font-face {
            font-family: 'MasaFont';
            font-weight: 200;
            src: url('fonts/MasaFont-ExtraLight.ttf') format('truetype');
        }
        @font-face {
            font-family: 'MasaFont';
            font-weight: 300;
            src: url('fonts/MasaFont-Light.ttf') format('truetype');
        }
        @font-face {
            font-family: 'MasaFont';
            font-weight: 400;
            src: url('fonts/MasaFont-Regular.ttf') format('truetype');
        }
        @font-face {
            font-family: 'MasaFont';
            font-weight: 500;
            src: url('fonts/MasaFont-Medium.ttf') format('truetype');
        }
        @font-face {
            font-family: 'MasaFont';
            font-weight: 700;
            src: url('fonts/MasaFont-Bold.ttf') format('truetype');
        }
    </style>
</head>


<body>
    <div class="studio-container">
        <header>
            <h1>Sketch Tool</h1>
            <div class="header-actions">
                <input type="file" id="imageLoader" accept="image/*" style="display: none;">
                <button id="loadBtn">載入圖檔</button>
                <button id="loadWorkspaceBtn">切換工作區</button>
                <button id="saveBackBtn" class="primary" style="display: none;">直接存回</button>
                <button id="clearBtn">清除</button>
                <button id="undoBtn">復原</button>
                <button id="toggleRegionsBtn">顯示結構範圍</button>
                <input type="text" id="charNameInput" placeholder="字名 (如: 宛)" style="display: none;">
                <button id="saveInkBtn">儲存透明書法</button>
                <button id="saveWorkspaceBtn" class="primary">儲存工作區</button>
                <button id="saveToFolderBtn" class="primary">存入字資料夾</button>
                <button id="saveBtn">儲存單張</button>
                <button id="saveAndClearBtn" class="primary">儲存並繼續繪製</button>
            </div>
        </header>

        <div class="canvas-wrapper">
            <div id="referenceLayer" class="reference-layer"></div>
            <canvas id="bgCanvas"></canvas>
            <canvas id="sketchCanvas"></canvas>
            <canvas id="calligraphyCanvas"></canvas>
            <canvas id="regionCanvas"></canvas>
            <div id="textOverlayContainer"></div>
        </div>

        <div class="toolbar">
            <div class="tool-group">
                <label>圖層切換</label>
                <button id="layerLayoutBtn" class="layer-btn active" data-layer="layout">佈局 (Layout)</button>
                <button id="layerCalligraphyBtn" class="layer-btn" data-layer="calligraphy">書法 (Ink)</button>
            </div>
            <div class="tool-group calli-text-group" style="display: none;">
                <label>書法字輸入</label>
                <input type="text" id="calligraphyInput" placeholder="輸入字">
                <select id="fontSelect" style="width: 120px;">
                    <option value="'MasaFont', cursive" selected>正風毛筆 (Masa)</option>
                </select>

                <select id="fontWeightSelect" style="width: 80px;">
                    <option value="200">極細 200</option>
                    <option value="300">細體 300</option>
                    <option value="400" selected>標準 400</option>
                    <option value="500">中等 500</option>
                    <option value="700">粗體 700</option>
                </select>
                <button id="addTextBtn" class="primary">置入畫布</button>
            </div>
            <div class="tool-group rotate-controls" style="display: none;">
                <label>3D 旋轉與屬性</label>
                <div
                    style="display: flex; align-items: center; gap: 5px; color: white; font-size: 0.8rem; margin-bottom: 10px; width: 100%;">
                    <input type="checkbox" id="isPhonetic" style="width: 15px; height: 15px;">
                    <label for="isPhonetic">作為聲符 (Phonetic)</label>
                </div>
                <div class="control-item">
                    <span>X: <span id="valX">0</span>°</span>
                    <input type="range" id="rotateX" min="-180" max="180" value="0">
                </div>
                <div class="control-item">
                    <span>Y: <span id="valY">0</span>°</span>
                    <input type="range" id="rotateY" min="-180" max="180" value="0">
                </div>
                <div class="control-item">
                    <span>Z: <span id="valZ">0</span>°</span>
                    <input type="range" id="rotateZ" min="-180" max="180" value="0">
                </div>
            </div>
            <div class="tool-group">
                <label>筆刷大小</label>
                <input type="range" id="brushSize" min="1" max="50" value="3">
            </div>
            <div class="tool-group">
                <label>顏色</label>
                <div class="color-option active" data-color="#ffffff" style="background: #ffffff;"></div>
                <div class="color-option" data-color="#888888" style="background: #888888;"></div>
                <div class="color-option" data-color="#ff4444" style="background: #ff4444;"></div>
                <div class="color-option" data-color="#000000" style="background: #000000; border: 1px solid #444;">
                </div>
            </div>
        </div>
        <div class="drafts-gallery">
            <h3>本次草稿 (點擊下載)</h3>
            <div id="galleryItems" class="gallery-items"></div>
        </div>
    </div>
    <div id="toastContainer"></div>

    <!-- 工作區選取彈窗 -->
    <div id="workspaceModal" class="modal-overlay">
        <div class="modal-content">
            <h2>切換工作區</h2>
            <div id="workspaceList" class="workspace-list">
                <!-- 由 JS 動態填充 -->
            </div>
            <div class="modal-actions">
                <button id="closeModalBtn">取消</button>
            </div>
        </div>
    </div>

    <script src="main.js?v=11"></script>
</body>

</html>
